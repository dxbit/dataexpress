<title>Экспорт отчета</title>
</head>
<body bgcolor=#fff8dc>
Данные отчета экспортируются в файл csv в кодировке ANSI или UTF-8. Значения отделяются точкой с запятой. Первая строка содержит названия полей отчета. Имя файла указывать необязательно. В этом случае файл будет создан во временной папке Windows.
</body>
