<title>Кнопки</title>
</head>
<body bgcolor=#fff8dc>
Кнопки повторяют команды контекстного меню. На состав кнопок также влияет ограничения доступа. Кнопки таблицы "Вверх" и "Вниз" отображаются, если нет сортировки. Если запрос не простой (т. е. содержит группировки или объединения), то доступна только кнопка "Обновить".
</body>
