<title>Флажок</title>
</head>
<body bgcolor=#fff8dc>
Флажок может хранить одно из двух значений: отмечено / не отмечено, Да / Нет, Истина / Ложь, 1 / 0.<br><br>

<b>Замечание. </b>При добавлении поля в существующую базу, программа автоматически записывает в это поле во всех записях значение 0.
</body>
