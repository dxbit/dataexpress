<title>Контекстный поиск</title>

<body bgcolor=#fff8dc>
Если таблица нередактируемая, можно пользоваться контекстным поиском. Начните вводить текст и программа будет искать введенный текст в выбранном столбце. Клавиши <i>Вверх</i> и <i>Вниз</i> перещают к следующему или предыдущему найденному значению.
