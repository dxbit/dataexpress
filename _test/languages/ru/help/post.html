<title>Сохранение записи</title>
</head>
<body bgcolor=#fff8dc>
Кнопка сохранения записи используется для принудительного сохранения. Но это не обязательно, т. к. программа автоматически сохраняет запись при переходе на другую запись, при переходе на другую форму, при выходе из программы, при открытии фильтра или отчета, при переходе в дизайнер.
</body>
