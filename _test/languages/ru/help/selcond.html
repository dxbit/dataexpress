<title>Условие отбора</title>
</head>
<body bgcolor=#fff8dc>
Условие отбора позволяет ограничить доступный пользователю набор данных. Например:<br>

<center><code>
[Сотрудник]=OBJID('Сотрудники', 'Имя', user)
</code></center><br>

С помощью этого выражения пользователю будут доступны только его записи. Условие отбора составляется аналогично <a href="listfilter.html">фильтру списка</a>.
</body>
</html>
