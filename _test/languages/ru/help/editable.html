<title>Редактируемое</title>

<body bgcolor=#fff8dc>
По умолчанию поля с выражениями нельзя редактировать. Это свойство разрешает редактировать поле с выражением. Помните, что при изменении поля, на которое есть ссылка в выражении, введенное вручную значение заменится результатом вычисления выражения.
