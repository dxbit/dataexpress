<title>Показывать полосы прокрутки</title>
</head>
<body bgcolor=#fff8dc>
Если установлен флажок, то когда размер формы становится меньше заданного в дизайнере, появляются полосы прокрутки. Если флажок снят, то форма заполняет всю рабочую область. Вы можете установить <a href="anchors.html">якоря</a> в компонентах, чтобы менять их размер вместе с формой или другим контейнером.
</body>
</html>
