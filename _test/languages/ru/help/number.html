<title>Число</title>

<body bgcolor=#fff8dc>
Данное поле хранить числовые данные: целые и дробные. Вы можете настроить отображаемую точность - число знаков после запятой. Поле может вычислять выражение.<br><br>

<b>Замечание. </b>При добавлении поля в существующую базу, программа автоматически записывает в это поле во всех записях значение 0.
