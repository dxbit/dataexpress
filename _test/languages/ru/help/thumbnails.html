<title>Миниатюры</title>
</head>
<body bgcolor=#fff8dc>
Миниатюры - уменьшенные копии изображений в базе данных. Миниатюры всегда хранятся в базе. Миниатюра отображается в табличной части формы. Если размер миниатюры равен 0, то миниатюра не создается.
