<title>Сохранение изменений</title>
</head>
<body bgcolor=#fff8dc>
Изменения сохраняются, когда вы переходите в режим ввода или когда нажимаете кнопку <i>Сохранить</i>. Если в режиме дизайнера выйти из программы, то изменения не сохраняются.
</body>
