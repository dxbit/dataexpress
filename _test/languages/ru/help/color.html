<title>Цвет</title>
</head>
<body bgcolor=#fff8dc>
Данное свойство задает цвет фона форм и компонентов. Чтобы изменить цвет фона нескольких компонентов, выделите группу компонентов и выберите из контекстного меню пункт <b>Цвет</b>. При этом автоматически устанавливается цвет первого выделенного компонента.
</body>
