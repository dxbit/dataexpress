<title>Перемещение компонентов</title>
</head>
<body bgcolor=#fff8dc>
Команда <i>Переместить</i> позволяет переместить компоненты из одного контейнера в другой. Выделите компоненты и выберите команду <i>Переместить</i>. Затем, выберите нужный контейнер и выберите команду <i>Вставить</i>. Команда действует в пределах формы.
</body>
</html>
