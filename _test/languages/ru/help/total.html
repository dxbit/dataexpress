<title>Вставка итоговой функции</title>
</head>
<body bgcolor=#fff8dc>
Это окно упрощает написание итоговых функций в выражении. Просто выберите соответствующие параметры. Для функции <i>Количество</i> поле выбирать не нужно. Если выбрана таблица, то в списке полей будут только числовые поля. Если выбран запрос, то в списке будут числовые и все вычисляемые поля.
</body>
